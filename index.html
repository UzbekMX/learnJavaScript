<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/style/style.css">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="calc-input">
            <input class="value1" value="" type="number">
            <select class="operator">
                <option value="+" class="plus">+</option>
                <option value="-" class="minus">-</option>
                <option value="*" class="multiply">*</option>
                <option value="/" class="divide">/</option>
            </select>
            <input class="value2" value="" type="number">
            <button class="calc-btn">
                =
            </button>
            <input class="result" readonly>
        </div>
    </section>
    <section class="section-input">
        <input class="my-input" type="text">
    </section>
    <script src="./assets/script/script.js"></script>
    <script src="./assets/script/script-2.js"></script>
</body>

</html>
